    <!-- Inline critical splash screen styles for instant render -->
    <style>
      #splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #F97316 0%, #EA580C 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.4s ease-out, visibility 0.4s ease-out;
      }
      #splash-screen.hidden {
        opacity: 0;
        visibility: hidden;
      }
      .splash-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
      }
      .splash-logo {
        width: 120px;
        height: 120px;
        animation: pulse-logo 2s ease-in-out infinite;
        /* Placeholder background while image loads */
        background: rgba(255,255,255,0.1);
        border-radius: 20px;
      }
      .splash-logo.loaded {
        background: transparent;
      }
      .splash-text {
        color: white;
        font-size: 28px;
        font-weight: 600;
        font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
        letter-spacing: -0.5px;
      }
      .splash-loader {
        width: 180px;
        height: 4px;
        background: rgba(255, 255, 255, 0.3);
        border-radius: 4px;
        overflow: hidden;
      }
      .splash-loader-bar {
        width: 40%;
        height: 100%;
        background: white;
        border-radius: 4px;
        animation: loading-bar 1.2s ease-in-out infinite;
      }
      @keyframes pulse-logo {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.05); opacity: 0.9; }
      }
      @keyframes loading-bar {
        0% { transform: translateX(-100%); }
        50% { transform: translateX(150%); }
        100% { transform: translateX(400%); }
      }
      #root {
        opacity: 0;
        transition: opacity 0.5s ease-out;
      }
      #root.content-ready {
        opacity: 1;
      }
    </style>
    <meta property="og:title" content="Qualify — O CRM com IA feito para Agências de Marketing e Freelancers">
    <meta name="twitter:title" content="Qualify — O CRM com IA feito para Agências de Marketing e Freelancers">
    <meta property="og:description" content="Chega de leads perdidos no WhatsApp e planilhas confusas. Centralize clientes, priorize oportunidades e aumente conversões com pipeline, BANT e IA.">
    <meta name="twitter:description" content="Chega de leads perdidos no WhatsApp e planilhas confusas. Centralize clientes, priorize oportunidades e aumente conversões com pipeline, BANT e IA.">
    <!-- Meta Pixel Code -->
    <script>
      !function(f,b,e,v,n,t,s)
      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)}(window, document,'script',
      'https://connect.facebook.net/en_US/fbevents.js');
      fbq('init', '2107598776763930');
      fbq('track', 'PageView');
    </script>
    <!-- End Meta Pixel Code -->
  </head>

  <body>
    <!-- Meta Pixel Code (noscript) -->
    <noscript><img height="1" width="1" style="display:none"
      src="https://www.facebook.com/tr?id=2107598776763930&ev=PageView&noscript=1"
    /></noscript>
    <!-- End Meta Pixel Code (noscript) -->

    <!-- Custom Splash Screen -->
    <div id="splash-screen">
      <div class="splash-content">
        <img 
          src="/splash-logo-white.png" 
          alt="Qualify" 
          class="splash-logo" 
          width="120" 
          height="120"
          decoding="sync"
          fetchpriority="high"
          onload="this.classList.add('loaded')"
        />
        <div class="splash-loader">
          <div class="splash-loader-bar"></div>
        </div>
        <span class="splash-text">Qualify</span>
      </div>
    </div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
