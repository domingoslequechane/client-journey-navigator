<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Qualify — O CRM com IA feito para Agências de Marketing e Freelancers</title>
    <meta name="description" content="Chega de leads perdidos no WhatsApp e planilhas confusas. Centralize clientes, priorize oportunidades e aumente conversões com pipeline, BANT e IA.">
    <meta name="author" content="Qualify" />
    <meta name="keywords" content="agência de marketing, gestão de clientes, CRM para agências, social media, pipeline de vendas, BANT, jornada do cliente">

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#F97316" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Qualify" />
    <link rel="apple-touch-icon" href="/pwa-512x512.png" sizes="512x512" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" sizes="192x192" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://qualify.app/" />
    <meta property="og:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/tZBCHmXrqSTdKwhirb4cfmIkv3U2/social-images/social-1766401209328-Frame 1.png">
    <meta property="og:site_name" content="Qualify" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://qualify.app/" />
    <meta name="twitter:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/tZBCHmXrqSTdKwhirb4cfmIkv3U2/social-images/social-1766401209328-Frame 1.png">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta property="og:title" content="Qualify — O CRM com IA feito para Agências de Marketing e Freelancers">
    <meta name="twitter:title" content="Qualify — O CRM com IA feito para Agências de Marketing e Freelancers">
    <meta property="og:description" content="Chega de leads perdidos no WhatsApp e planilhas confusas. Centralize clientes, priorize oportunidades e aumente conversões com pipeline, BANT e IA.">
    <meta name="twitter:description" content="Chega de leads perdidos no WhatsApp e planilhas confusas. Centralize clientes, priorize oportunidades e aumente conversões com pipeline, BANT e IA.">
  </head>

  <body>
    <!-- Custom Splash Screen -->
    <div id="splash-screen">
      <div class="splash-content">
        <img src="/splash-logo-white.png" alt="Qualify" class="splash-logo" />
        <div class="splash-loader">
          <div class="splash-loader-bar"></div>
        </div>
        <span class="splash-text">Qualify</span>
      </div>
    </div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <style>
      #splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #F97316 0%, #EA580C 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.4s ease-out, visibility 0.4s ease-out;
      }
      
      #splash-screen.hidden {
        opacity: 0;
        visibility: hidden;
      }
      
      .splash-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
      }
      
      .splash-logo {
        width: 120px;
        height: 120px;
        animation: pulse-logo 2s ease-in-out infinite;
      }
      
      .splash-text {
        color: white;
        font-size: 28px;
        font-weight: 600;
        font-family: 'Space Grotesk', system-ui, sans-serif;
        letter-spacing: -0.5px;
      }
      
      .splash-loader {
        width: 180px;
        height: 4px;
        background: rgba(255, 255, 255, 0.3);
        border-radius: 4px;
        overflow: hidden;
      }
      
      .splash-loader-bar {
        width: 40%;
        height: 100%;
        background: white;
        border-radius: 4px;
        animation: loading-bar 1.2s ease-in-out infinite;
      }
      
      @keyframes pulse-logo {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.05); opacity: 0.9; }
      }
      
      @keyframes loading-bar {
        0% { transform: translateX(-100%); }
        50% { transform: translateX(150%); }
        100% { transform: translateX(400%); }
      }
      
      /* Animação de entrada do conteúdo principal */
      #root {
        opacity: 0;
        transform: translateY(10px);
        transition: opacity 0.5s ease-out, transform 0.5s ease-out;
      }
      
      #root.content-ready {
        opacity: 1;
        transform: translateY(0);
      }
    </style>
  </body>
</html>
